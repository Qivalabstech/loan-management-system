services:
  - type: web
    name: loan-management-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000
      - key: EMAIL_HOST
        value: smtp.ethereal.email
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        value: change_me
      - key: EMAIL_PASS
        value: change_me
